---
name: .NET
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history required for SourceLink
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore src
      - name: Build
        run: dotnet build src --no-restore
      - name: Test
        run: dotnet test src --no-restore --collect:"XPlat Code Coverage" --settings src/Tests/RonSijm.AnaalIJzer.UnitTests/coverlet.runsettings --results-directory ./coverage
      - name: Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          directory: ./coverage
          fail_ci_if_error: true
          verbose: true
      - name: Build Release
        run: |
          dotnet build src/Main/RonSijm.AnaalIJzer --configuration Release --no-restore
          dotnet build src/Tools/RonSijm.AnaalIJzer.Ridder --configuration Release --no-restore
      - name: Pack
        run: |
          dotnet pack src/Main/RonSijm.AnaalIJzer --configuration Release --no-build --output ./artifacts/packages
          dotnet pack src/Tools/RonSijm.AnaalIJzer.Ridder --configuration Release --no-build --output ./artifacts/packages
      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{secrets.NUGET_API_KEY}}
        run: |
          dotnet nuget push ./artifacts/packages/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
