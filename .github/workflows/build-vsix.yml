name: build-vsix

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-vsix:
    runs-on: windows-latest
    env:
      VS_MARKETPLACE_TOKEN: ${{secrets.VS_MARKETPLACE_TOKEN}}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build VSIX artifact
        run: build\Scripts\build-vs-extension.cmd

      - name: Test VSIX support code
        run: dotnet test src\Tests\RonSijm.AnaalIJzer.VisualStudio.Tests\RonSijm.AnaalIJzer.VisualStudio.Tests.csproj --configuration Release --no-build

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnaalIJzer-VisualStudio-VSIX
          path: build\Artifacts\VisualStudio\*.vsix

      - name: Publish VSIX to Visual Studio Marketplace
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.VS_MARKETPLACE_TOKEN != ''
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -LiteralPath .\build\Artifacts\VisualStudio -Filter *.vsix | Select-Object -First 1
          if ($null -eq $vsix) {
              throw "No VSIX was found in build\Artifacts\VisualStudio."
          }

          $publisher = Get-ChildItem -LiteralPath "$env:USERPROFILE\.nuget\packages\microsoft.vssdk.buildtools" -Recurse -Filter VsixPublisher.exe |
              Where-Object { $_.FullName -like "*\tools\vssdk\bin\VsixPublisher.exe" } |
              Select-Object -First 1
          if ($null -eq $publisher) {
              throw "VsixPublisher.exe was not found in the restored Microsoft.VSSDK.BuildTools package."
          }

          & $publisher.FullName publish `
              -payload $vsix.FullName `
              -publishManifest .\src\Extensions\RonSijm.AnaalIJzer.VisualStudio\marketplace-publish.json `
              -personalAccessToken "$env:VS_MARKETPLACE_TOKEN"
